{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-4">

            <h3 class="mb-3">Book Form</h3>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success">Save</button>

            </form>

            <br>

            <a class="btn btn-secondary" href="{% url 'book-list' %}">Back</a>

        </div>

    </div>

</div>

{% endblock %}
