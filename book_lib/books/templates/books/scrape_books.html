{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-4">

            <h3 class="mb-3 text-center">Scrape Books</h3>

            <form method="post">

                {% csrf_token %}

                <label class="form-label">Select Category</label>

                <select class="form-select" name="category">

                    <option value>-- Select Category --</option>

                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}

                </select>

                <br>

                <button class="btn btn-primary w-100">Start Scraping</button>

            </form>

            <br>

            <a class="btn btn-secondary w-100" href="{% url 'book-list' %}">
                Back to Books
            </a>

        </div>

    </div>

</div>

{% endblock %}
