<h1>Scrape Books</h1>

{% if messages %}
<ul>
    {% for msg in messages %}
    <li>{{ msg }}</li>
    {% endfor %}
</ul>
{% endif %}

<form method="post">
    {% csrf_token %}

    <label>Select Category:</label>
    <select name="category">
        <option value>-- Select --</option>
        {% for cat in categories %}
        <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
    </select>

    <br><br>
    <button type="submit">Scrape</button>
</form>

<br>
<a href="{% url 'book-list' %}">Back to Books</a>
