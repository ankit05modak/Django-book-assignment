<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Library Management</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>

    <body class="bg-light">

        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <span class="navbar-brand mb-0 h1">📚 Library Management
                    System</span>
            </div>
        </nav>

        <div class="container mt-4">

            {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-info">
                {{ msg }}
            </div>
            {% endfor %}
            {% endif %}

            {% block content %}
            {% endblock %}

        </div>

    </body>
</html>
